apiVersion: apps/v1
kind: Deployment
metadata:
  name: simple-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: simple-app
  template:
    metadata:
      labels:
        app: simple-app
    spec:
      containers:
      - name: simple-app
        image: 825982959131.dkr.ecr.ap-southeast-1.amazonaws.com/simple-app:latest
        ports:
        - containerPort: 5000