name: Deploy to EKS

on:
  push:
    branches:
      - main
  
env:
  AWS_REGION: ap-southeast-1
  ECR_REPOSITORY: simple-app
  EKS_CLUSTER: joel-eks

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      run: |
        git clone https://github.com/joelheryanto/cloud-portofolio-combine-IAAC.git .

    - name: Configure AWS credentials
      run: |
        aws configure set aws_access_key_id ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws configure set aws_secret_access_key ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws configure set region ${{ env.AWS_REGION }}

    - name: Login to ECR
      run: |
        aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com

    - name: Build and push Docker image
      run: |
        docker build -t ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION  }}.amazonaws.com/${{ env.ECR_REPOSITORY }}:latest ./01-docker
        docker push ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION  }}.amazonaws.com/${{ env.ECR_REPOSITORY }}:latest
    
    - name: Update kuberconfig
      run: | 
        aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER }} --region ${{ env.AWS_REGION }}

    - name: Deploy to EKS
      run: |
        kubectl apply -f 03-kubernets/deployment.yaml
        kubectl apply -f 03-kubernetes/service.yaml
        kubectl rollout status deployment/simple-app