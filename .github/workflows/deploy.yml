name: Deploy to EKS

on:
  push:
    branches:
      - main
  
env:
  AWS_REGION: ap-southeast-1
  ECR_REPOSITORY: simple-app
  EKS_CLUSTER: joel-eks

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: action/checkout@v3

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }} 
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to ECR
      id: login-ecr 
      uses: aws-actions/amazon-ecr-login@v1

    - name: Build and push Docker image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
      run: |
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:latest ./01-docker
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
    
    - name: Update kuberconfig
      run: | 
        aws eks update-kubeconfig --name $EKS_CLUSTER --region $AWS_REGION

    - name: Deploy to EKS
      run: |
        kubectl apply -f 03-kubernets/deployment.yaml
        kubectl apply -f 03-kubernetes/service.yamlkubectl rollout status deployment/simple-app